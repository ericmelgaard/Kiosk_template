<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>WAND Digital Asset</title>
    <link rel="stylesheet" href="resources/app.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="resources/kiosk.css" />
    <link rel="icon" type="image/x-icon" href="resources/favicon.ico" />
    <script type="text/javascript" src="dependencies/jquery-3.7.0.min.js"></script>
    <script type="text/javascript" src="dependencies/mustache.min.js"></script>
    <script type="text/javascript" src="dependencies/dexie.min.js"></script>
    <script type="text/javascript" src="dependencies/math.min.js"></script>
    <script type="text/javascript" src="dependencies/lodash.min.js"></script>
    <script type="text/javascript" src="dependencies/wandLib.js"></script>
    <script type="text/javascript" src="js/nutrition-reference.js"></script>
    <script type="text/javascript" src="js/inactivity-manager.js"></script>
    <script type="text/javascript" src="js/integration.js"></script>
    <script type="text/javascript" src="js/menuLayout.js"></script>
    <script type="text/javascript" src="js/app.js"></script>
</head>

<body>
    <!-- info -->
    <div style="display: none">
        <div id="wand">
            <span id="apiKey" class="Text Text-XXXX"></span>
            <!--required for Windows devices-->
            <span id="storeKey" class="Text Text-XXXX"></span>
        </div>
    </div>
    <div class="background"></div>

    <!--asset wrapper-->
    <div id="target" class="asset-wrapper" style="display: none;">
        <!--remove-->
        <div class="information-text"><img height="30px" src="resources/icon.png">WAND Digital Asset - Master(61)</div>
        <img style="position: absolute; height: 50%; top: 30%; left: 35%; opacity: .3;" id="assetImage"
            class="asset-image" src="resources/wand-icon-white-shadow.svg" alt="Asset Image" />
        <!--end remove-->

        <div id="zone_one" class="items-wrapper">
        </div>
    </div>

    <div onclick="hideFallback()" class="fallback-wrapper">
        <!-- Toast notification for station trouble -->
    </div>


    <img id="image" src="">
    </div>

    <div id="kiosk-overlay">
        <div id="kiosk-content"></div>
        <div id="nutrition-modal" style="display: none;"></div>
        <div id="inactivity-warning" style="display: none;">
            <div class="warning-content">
                <h2>Are you still there?</h2>
                <div class="countdown-circle">
                    <svg class="countdown-svg" width="120" height="120">
                        <circle class="countdown-bg" cx="60" cy="60" r="54"></circle>
                        <circle class="countdown-progress" cx="60" cy="60" r="54"></circle>
                    </svg>
                    <span class="countdown-text">10</span>
                </div>
                <p>Returning to home in <span id="countdown-seconds">10</span> seconds</p>
                <div class="warning-buttons">
                    <button id="continue-browsing-btn" class="primary-btn">Continue Browsing</button>
                    <button id="return-home-btn" class="secondary-btn">Return to Home</button>
                </div>
            </div>
        </div>
    </div>

    <!--scripts-->
    <script type="text/javascript" src="js/init.js"></script>
</body>

</html>
